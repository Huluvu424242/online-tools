name: Tests

on:
  push:
    branches:
      - master
      - develop

  pull_request:
    branches:
      - master
      - develop

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression-tests:
    name: JavaScript regression tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Create report directory
        run: mkdir -p reports

      - name: Run regression tests
        shell: bash
        run: |
          set -o pipefail
          node tests/run-all.js 2>&1 \
            | tee reports/yaml-properties-test.txt

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.run_number }}-${{ github.run_attempt }}
          path: reports/
          retention-days: 30
          if-no-files-found: error